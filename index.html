<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxNBh-chuRlsArJY6npqAX_7QCUjNF7Woc7nLy8OrFQQrBo-zPTYRmyjIXwd_bUO8c2/exec';

  async function register() {
    const user = prompt("ตั้งชื่อผู้ใช้:");
    const pass = prompt("ตั้งรหัสผ่าน:");

    const response = await fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify({ action: "register", username: user, password: pass })
    });
    
    const result = await response.json();
    alert(result.message);
  }
</script>

<button onclick="register()">ทดสอบสมัครสมาชิก</button>
